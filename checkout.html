<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 500: '#3b82f6', 600: '#2563eb' } } } } }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">
    <nav class="w-full z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-center items-center">
            <a href="index.html" class="font-heading font-bold text-2xl flex items-center gap-2"><i data-lucide="sparkles" class="text-brand-600"></i> Aura.</a>
        </div>
    </nav>

    <main class="flex-grow pt-10 pb-16">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col-reverse lg:flex-row gap-8">
                <!-- Checkout Form -->
                <div class="flex-grow">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
                        <form>
                            <!-- Contact Info -->
                            <div class="mb-8">
                                <h2 class="text-xl font-bold font-heading mb-4 text-slate-900">Contact Information</h2>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                                        <input type="email" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border" placeholder="you@example.com">
                                    </div>
                                </div>
                            </div>

                            <!-- Shipping -->
                            <div class="mb-8">
                                <h2 class="text-xl font-bold font-heading mb-4 text-slate-900">Shipping Address</h2>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">First name</label>
                                        <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">Last name</label>
                                        <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border">
                                    </div>
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
                                        <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border" placeholder="123 Main St">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">City</label>
                                        <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-medium text-slate-700 mb-1">Postal code</label>
                                        <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border">
                                    </div>
                                </div>
                            </div>

                            <!-- Payment -->
                            <div class="mb-8">
                                <h2 class="text-xl font-bold font-heading mb-4 text-slate-900">Payment</h2>
                                <div class="bg-slate-50 border border-slate-200 rounded-lg p-4 mb-4">
                                    <div class="flex items-center gap-3 mb-4">
                                        <input type="radio" checked name="payment" class="w-4 h-4 text-brand-600 focus:ring-brand-500 border-slate-300">
                                        <label class="font-medium text-slate-900 flex-grow">Credit Card</label>
                                        <div class="flex gap-1 text-slate-400">
                                            <i data-lucide="credit-card" class="w-5 h-5"></i>
                                        </div>
                                    </div>
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-sm text-slate-700 mb-1">Card number</label>
                                            <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border" placeholder="0000 0000 0000 0000">
                                        </div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-sm text-slate-700 mb-1">Expiration date (MM/YY)</label>
                                                <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border" placeholder="MM/YY">
                                            </div>
                                            <div>
                                                <label class="block text-sm text-slate-700 mb-1">CVC</label>
                                                <input type="text" class="w-full border-slate-300 rounded-lg shadow-sm focus:ring-brand-500 focus:border-brand-500 p-2.5 border" placeholder="123">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <button type="button" onclick="alert('Payment Successful! Thank you for shopping with Aura.'); window.location.href='index.html';" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 flex items-center justify-center text-lg">
                                <i data-lucide="lock" class="w-5 h-5 mr-2"></i> Pay $483.84
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Order Summary Mini -->
                <div class="w-full lg:w-96 flex-shrink-0">
                    <div class="bg-slate-50 rounded-2xl border border-slate-200 p-6 sticky top-24">
                        <h2 class="text-lg font-bold font-heading mb-6 border-b border-slate-200 pb-4">In your cart</h2>
                        
                        <!-- Items -->
                        <div class="space-y-4 mb-6">
                            <div class="flex gap-4 items-center">
                                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=100&q=80" class="w-16 h-16 rounded object-cover bg-white">
                                <div class="flex-grow text-sm">
                                    <h4 class="font-bold text-slate-900">Headphones</h4>
                                    <p class="text-slate-500">Qty: 1</p>
                                </div>
                                <div class="font-bold">$249.00</div>
                            </div>
                            <div class="flex gap-4 items-center">
                                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=100&q=80" class="w-16 h-16 rounded object-cover bg-white">
                                <div class="flex-grow text-sm">
                                    <h4 class="font-bold text-slate-900">Smart Watch</h4>
                                    <p class="text-slate-500">Qty: 1</p>
                                </div>
                                <div class="font-bold">$199.00</div>
                            </div>
                        </div>

                        <div class="space-y-3 pt-4 border-t border-slate-200 text-sm text-slate-600">
                            <div class="flex justify-between"><span>Subtotal</span><span class="font-medium text-slate-900">$448.00</span></div>
                            <div class="flex justify-between"><span>Shipping</span><span class="font-medium text-green-600">Free</span></div>
                            <div class="flex justify-between"><span>Taxes</span><span class="font-medium text-slate-900">$35.84</span></div>
                            <div class="flex justify-between items-center pt-4 border-t border-slate-200 mt-4 text-base">
                                <span class="font-bold text-slate-900">Total</span>
                                <span class="font-extrabold text-brand-600 text-xl">$483.84</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-slate-900 text-white py-8 text-center mt-auto">
        <p class="text-slate-400 text-sm">&copy; 2026 Aura E-Commerce.</p>
    </footer>
    <script>lucide.createIcons();</script>
</body>
</html>
